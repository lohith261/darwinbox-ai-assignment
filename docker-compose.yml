services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./:/app
    restart: unless-stopped

